<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.netflix-card {
			position: relative;
			width: 220px;
			aspect-ratio: 2 / 3;
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			transition: transform 0.3s ease;
		}

		.netflix-card:hover {
			transform: scale(1.05);
		}

		/* Poster */
		.netflix-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		/* Dark gradient overlay */
		.overlay {
			position: absolute;
			inset: 0;
			background: linear-gradient(to bottom,
					rgba(0, 0, 0, 0.2),
					rgba(0, 0, 0, 0.7));
		}

		/* Title */
		.title {
			position: absolute;
			top: 12px;
			left: 12px;
			color: #fff;
			font-size: 18px;
			font-weight: 700;
			letter-spacing: 1px;
			z-index: 2;
		}

		/* Big rank number */
		.rank {
			position: absolute;
			bottom: 9px;
			left: 10px;
			font-size: 96px;
			font-weight: 900;
			color: white;
			opacity: 0.9;
			line-height: 1;
			z-index: 5;

			color: black;
			-webkit-text-stroke: 3px rgb(255, 255, 255);

			text-shadow:
				0 4px 12px rgba(0, 0, 0, 0.6);

		}
	</style>
</head>

<body>
	<div class="netflix-card">
		<img src="pic.jpg" alt="Movie Poster">

		<div class="overlay"></div>

		<div class="title">TIMELESS</div>

		<div class="rank">1</div>
	</div>

</body>

</html>
