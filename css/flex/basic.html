<!DOCTYPE html>
<html>

<head>
	<title>Flexbox Activity 1</title>
	<style>
		.container {
			background-color: black;
			display: flex;
			flex-wrap: wrap;
			flex-direction: row;
			justify-content: space-between;

		}

		.box {
			background-color: lightcoral;
			color: white;
			font-size: 24px;
			padding: 20px;
			margin: 10px;

		}

		ul {
			display: flex;
			width: 400px;
			justify-content: space-evenly;
		}
	</style>
</head>

<body>
	<div class="container">

		<div class="box">icon welcome</div>
		<div class="box">
			<ul>
				<li>home</li>
				<li>about</li>
				<li>contact</li>
				<li>home</li>
			</ul>
		</div>


	</div>
</body>

</html>
