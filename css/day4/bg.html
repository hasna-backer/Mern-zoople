	<!-- 2️⃣ Gradients -->
	<section>
		<h2>Gradients</h2>

		<div
			style="background:linear-gradient(170deg, #0f0e0e, #feb47b, #5f5fff); padding:40px; margin:15px 0; color:white; font-weight:bold; text-align:center; border-radius:8px;">
			Linear Gradient
		</div>

		<div
			style="background:radial-gradient(circle, #6a11cb, #33fc25); padding:40px; margin:15px 0; color:white; font-weight:bold; text-align:center; border-radius:8px;">
			Radial Gradient
		</div>
	</section>

	<!-- 3️⃣ Shadows -->
	<section>
		<h2>Shadows</h2>

		<div
			style="background-color:#fff; color:#333; padding:30px; text-align:center; border-radius:10px; box-shadow:0 8px 15px rgba(0,0,0,0.3); width:250px; margin:20px auto;">
			Box Shadow Example
		</div>

		<p
			style="text-align:center; font-size:24px; font-weight:bold; color:#2c3e50; text-shadow:5px 2px 0px rgba(255,0,0,0.5);">
			Text Shadow Example
		</p>
	</section>
