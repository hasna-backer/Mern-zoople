<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Footer Replica – Flexbox</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: system-ui, sans-serif;
		}

		body {
			background: #111;
		}

		.footer {
			position: relative;
			min-height: 100vh;
			background: linear-gradient(180deg, #10c47a 0%, #0b5c4a 100%);
			color: #e9fff5;
			overflow: hidden;
		}

		/* terrain shape */
		.footer-overlay {
			position: absolute;
			bottom: 0;
			width: 100%;
			height: 40%;
			background: #053b32;
			/* clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 100%); */

			clip-path: circle(50% at 50% 50%);
		}

		.footer-content {
			position: relative;
			padding: 80px 100px 40px;
			z-index: 2;
		}

		/* top text section */
		.footer-brand h2 {
			font-size: 2.2rem;
			font-weight: 600;
		}

		.footer-brand span {
			font-weight: 400;
			opacity: 0.9;
		}

		.watch {
			margin: 20px 0;
			opacity: 0.8;
			cursor: pointer;
		}

		.btn {
			padding: 10px 18px;
			background: #fff;
			color: #0b5c4a;
			border: none;
			border-radius: 6px;
			font-weight: 600;
			cursor: pointer;
		}

		/* ===== FLEXBOX FOOTER LINKS ===== */
		.footer-links {
			margin-top: 80px;
			display: flex;
			justify-content: space-between;
			gap: 50px;
			flex-wrap: wrap;
		}

		.footer-links>div {
			flex: 1;
			min-width: 180px;
		}

		.footer-links h4 {
			font-size: 0.85rem;
			margin-bottom: 12px;
			opacity: 0.7;
		}

		.footer-links a {
			display: block;
			text-decoration: none;
			color: #e9fff5;
			opacity: 0.85;
			margin-bottom: 8px;
			font-size: 0.9rem;
		}

		.footer-links a:hover {
			opacity: 1;
		}

		/* bottom bar */
		.footer-bottom {
			margin-top: 60px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			font-size: 0.85rem;
			opacity: 0.8;
		}

		.footer-bottom select {
			background: transparent;
			color: #e9fff5;
			border: 1px solid rgba(255, 255, 255, 0.3);
			padding: 4px 8px;
		}
	</style>
</head>

<body>

	<footer class="footer">
		<div class="footer-overlay"></div>

		<div class="footer-content">

			<div class="footer-brand">
				<h2>Are you ready?<br><span>Make a difference!</span></h2>
				<p class="watch">▶ Watch video</p>
				<button class="btn">Choose forest</button>
			</div>

			<div class="footer-links">
				<div>
					<h4>GET STARTED</h4>
					<a href="#">Add CO₂ sources</a>
					<a href="#">Try Reforestum</a>
				</div>

				<div>
					<h4>REFORESTUM</h4>
					<a href="#">Our forests</a>
					<a href="#">How it works</a>
					<a href="#">Manifesto</a>
				</div>

				<div>
					<h4>THE PRODUCT</h4>
					<a href="#">Contacts us</a>
					<a href="#">Questions</a>
					<a href="#">Blog</a>
				</div>

				<div>
					<h4>LEGAL</h4>
					<a href="#">Terms & Conditions</a>
					<a href="#">Privacy policy</a>
				</div>
			</div>

			<div class="footer-bottom">
				<p>© REFORESTUM</p>
				<select>
					<option>English</option>
				</select>
			</div>

		</div>
	</footer>

</body>

</html>
