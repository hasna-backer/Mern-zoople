<!DOCTYPE html>
<html>

<head>
	<title>CSS Pseudo-Class Blog Activity</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<h1>My Tech Blog</h1>

	<!-- NAVIGATION -->
	<nav>
		<a href="#">Home</a>
		<a href="#">Articles</a>
		<a href="#">Contact</a>
	</nav>

	<!-- BLOG POSTS -->
	<section class="posts">
		<article>
			<h3>CSS Basics</h3>
			<p>Learn selectors and styles.</p>
		</article>

		<article>
			<h3>Flexbox</h3>
			<p>Master layouts easily.</p>
		</article>

		<article>
			<h3>JavaScript Intro</h3>
			<p>Understand logic and flow.</p>
		</article>
	</section>

	<!-- COMMENT FORM -->
	<h2>Leave a Comment</h2>
	<form>
		<input type="text" placeholder="Your name" required>
		<br><br>

		<input type="email" placeholder="Your email" required>
		<br><br>

		<textarea placeholder="Your comment"></textarea>
		<br><br>

		<input type="checkbox"> Notify me of replies
		<br><br>

		<button disabled>Post Comment</button>
	</form>

	<!-- FOOTER MESSAGE -->
	<footer>
		<div class="footer-msg"></div>
	</footer>

</body>

</html>
