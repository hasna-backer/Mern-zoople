<!DOCTYPE html>
<html lang="en">

<head>

	<title>CSS Methods Example</title>

	<!-- 🔹 External CSS -->
	<link rel="stylesheet" href="style.css">

	<!-- 🔹 Internal CSS -->
	<style>
		/* Internal CSS styles apply to this HTML page only */
		h2 {
			color: darkblue;
			text-align: center;
			background-color: #d0e6ff;
			padding: 10px;
		}
	</style>
</head>

<body>
	<h1>🎨 CSS Styling Methods</h1>

	<!-- 🔹 Inline CSS -->
	<p style="color: red; font-size: 20px;">
		This paragraph is styled using <strong>Inline CSS</strong>.
	</p>

	<h2>This heading is styled using Internal CSS</h2>

	<h3 style="color:green;">External CSS Example for body element</h3>

	<h5>change my color</h5>

</body>

</html>
