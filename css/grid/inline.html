<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.container {
			border: 1px solid #ccc;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
		}

		.container1 {
			border: 1px solid #c11e1e;

			display: inline-grid;
			grid-template-columns: repeat(3, 1fr);
		}
	</style>
</head>

<body>
	TEXT BEFORE
	<div class="container">
		<div>1</div>
		<div>2</div>
		<div>3</div>
	</div>
	TEXT AFTER

	TEXT BEFORE
	<div class="container1">
		<div>1</div>
		<div>2</div>
		<div>3</div>
	</div>
	TEXT AFTER
</body>

</html>
