<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Glass Login</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!-- Font -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

	<!-- Icons -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Poppins", sans-serif;
		}

		body {
			min-height: 100vh;
			background: url("https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17") center/cover no-repeat;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* Glass Card */
		.login-card {
			width: 360px;
			padding: 30px;
			border-radius: 16px;
			/* background: rgba(255, 255, 255, 0.15); */
			-webkit-backdrop-filter: blur(15px);
			backdrop-filter: blur(15px);
			border: 1px solid rgba(255, 255, 255, 0.3);
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
			color: #fff;
		}

		.login-card h2 {
			text-align: center;
			margin-bottom: 25px;
			font-weight: 600;
		}

		/* Input Group */
		.input-group {
			position: relative;
			margin-bottom: 20px;
		}

		.input-group input {
			width: 100%;
			padding: 12px 40px 12px 10px;
			background: transparent;
			border: none;
			border-bottom: 1px solid rgba(255, 255, 255, 0.6);
			outline: none;
			color: #fff;
			font-size: 14px;
		}

		.input-group i {
			position: absolute;
			right: 10px;
			top: 50%;
			transform: translateY(-50%);
			color: #060606;
			font-size: 14px;
		}

		.input-group input::placeholder {
			color: rgba(2, 2, 2, 0.8);
		}

		/* Options */
		.options {
			display: flex;
			justify-content: space-between;
			align-items: center;
			font-size: 12px;
			margin-bottom: 20px;
		}

		.options label {
			display: flex;
			align-items: center;
			gap: 5px;
			cursor: pointer;
		}

		.options a {
			color: #070707;
			text-decoration: none;
		}

		.options a:hover {
			text-decoration: underline;
		}

		/* Button */
		.login-btn {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 25px;
			background: #fff;
			color: #000;
			font-weight: 600;
			cursor: pointer;
			transition: 0.3s;
		}

		.login-btn:hover {
			background: #ddd;
		}

		/* Footer */
		.footer-text {
			text-align: center;
			margin-top: 5px;
			font-size: 13px;
		}

		.footer-text a {
			color: #fff;
			font-weight: 600;
			text-decoration: none;
		}

		.footer-text a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>

	<div class="login-card">
		<h2>Login</h2>

		<div class="input-group">
			<input type="email" placeholder="Email" required>
			<i class="fa-solid fa-envelope"></i>
		</div>

		<div class="input-group">
			<input type="password" placeholder="Password" required>
			<i class="fa-solid fa-lock"></i>
		</div>

		<div class="options">
			<label>
				<input type="checkbox">
				Remember me
			</label>
			<a href="#">Forgot Password?</a>
		</div>

		<button class="login-btn">Login</button>

		<div class="footer-text">
			Don't have an account? <a href="#">Register</a>
		</div>
	</div>

</body>

</html>
