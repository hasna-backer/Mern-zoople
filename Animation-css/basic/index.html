<!DOCTYPE html>
<html>

<head>
	<style>
		@keyframes squareMove {
			0% {
				transform: translate(0, 0);
			}

			25% {
				transform: translate(30px, 0);
			}

			50% {
				transform: translate(30px, 30px);
			}

			75% {
				transform: translate(0, 30px);
			}

			100% {
				transform: translate(0, 0);
			}
		}

		div {
			width: 100px;
			height: 100px;
			background: coral;
			animation: squareMove 3s linear infinite;
		}
	</style>
</head>

<body>
	<div>hiiii</div>
</body>

</html>
