<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<style>
	@keyframes colorShift {
		0% {
			background: #ff9
		}

		20% {
			background: rgb(22, 26, 223)
		}

		40% {
			background: rgb(223, 22, 22)
		}

		60% {
			background: rgb(223, 223, 22)
		}

		80% {
			background: rgb(22, 223, 74)
		}

		100% {
			background: rgb(255, 153, 161)
		}


	}


	.steps {
		animation: colorShift 3s infinite;
	}
</style>

<body>
	<div class="steps">Steps</div>

</body>

</html>
