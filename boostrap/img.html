<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<style>
		.glass-navbar {
			background: rgba(255, 255, 255, 0.2);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.3);
			margin-top: 20px;
			margin-left: 20px;
			margin-right: 20px;
			border-radius: 20px;
		}

		.nav-link {
			color: #000 !important;
			font-weight: 500;
			font-family: 'Times New Roman', Times, serif;
		}

		.brand {
			font-weight: bold;
			font-size: 1.4rem;
		}

		.card-container {
			position: absolute;
			bottom: 30px;
			left: 30px;
			display: flex;
			gap: 15px;
		}

		.tour-card {
			width: 150px;
			height: 220px;
			border-radius: 15px;
			overflow: hidden;

		}

		.tour-card img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.tour-card::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
		}

		.card img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.tour-card-text {
			position: absolute;
			bottom: 15px;
			left: 15px;
			right: 15px;
			color: white;
			font-weight: 500;
			z-index: 2;
			font-size: 0.95rem;
		}
	</style>
</head>

<body>
	<img class="img-fluid" src="japan.jpg" alt="New York" style="width: 100%; height: 700px;">
	<nav class="navbar glass-navbar fixed-top">
		<div class="container-fluid">
			<!-- Left -->
			<a class="navbar-brand brand" href="#" style="font-family: 'Times New Roman', Times, serif;">🌐 JAPAN
				TOURS</a>
			<!-- Center -->
			<ul class="navbar-nav mx-auto flex-row gap-4">
				<li class="nav-item">
					<a class="nav-link" href="#">ABOUT</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" href="#">INCLUDED</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" href="#">CONTACT</a>
				</li>
			</ul>
			<!-- Right -->
			<button class="btn btn-dark rounded-pill px-4"
				style="font-family: 'Times New Roman', Times, serif;">BOOK</button>
		</div>
	</nav>
	<div class="card-container">
